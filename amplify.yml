version: 1
frontend:
  phases:
    preBuild:
      commands:
        - git lfs install
        - git lfs pull
        - npm ci
    build:
      commands:
        - rm -rf dist
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []
  customRedirects:
    - source: '/the-way/support'
      target: '/index.html'
      status: '200'
    - source: '/the-way/support/'
      target: '/index.html'
      status: '200'
    - source: '/the-way/privacy'
      target: '/index.html'
      status: '200'
    - source: '/the-way/privacy/'
      target: '/index.html'
      status: '200'
    - source: '/the-way/terms'
      target: '/index.html'
      status: '200'
    - source: '/the-way/terms/'
      target: '/index.html'
      status: '200'
    - source: '/<*>'
      target: '/index.html'
      status: '200'
  customHeaders:
    - pattern: '**/*.wasm'
      headers:
        - key: 'Content-Type'
          value: 'application/wasm'
    - pattern: '**/*.pck'
      headers:
        - key: 'Content-Type'
          value: 'application/octet-stream'
