version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Default Amplify image has no git-lfs; install to /usr/local/bin (each command is a new shell).
        - |
          if ! command -v git-lfs >/dev/null 2>&1; then
            curl -sL https://github.com/git-lfs/git-lfs/releases/download/v3.6.1/git-lfs-linux-amd64-v3.6.1.tar.gz | tar -xz -C /tmp
            install -m 755 /tmp/git-lfs-3.6.1/git-lfs /usr/local/bin/git-lfs
            git lfs install
          fi
        # SSH deploy keys cannot fetch Git LFS objects; use HTTPS for the pull step.
        - |
          if [ -n "$GITHUB_PAT" ]; then
            git remote set-url origin "https://x-access-token:${GITHUB_PAT}@github.com/IsaacTrevino/isaac.git"
          else
            git remote set-url origin https://github.com/IsaacTrevino/isaac.git
          fi
          git lfs pull
          test "$(wc -c < client/public/the-way/index.pck)" -gt 1000000
        - npm ci
    build:
      commands:
        - rm -rf dist
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []
  customRedirects:
    - source: '/the-way/support'
      target: '/index.html'
      status: '200'
    - source: '/the-way/support/'
      target: '/index.html'
      status: '200'
    - source: '/the-way/privacy'
      target: '/index.html'
      status: '200'
    - source: '/the-way/privacy/'
      target: '/index.html'
      status: '200'
    - source: '/the-way/terms'
      target: '/index.html'
      status: '200'
    - source: '/the-way/terms/'
      target: '/index.html'
      status: '200'
    - source: '/<*>'
      target: '/index.html'
      status: '200'
  customHeaders:
    - pattern: '**/*.wasm'
      headers:
        - key: 'Content-Type'
          value: 'application/wasm'
    - pattern: '**/*.pck'
      headers:
        - key: 'Content-Type'
          value: 'application/octet-stream'
